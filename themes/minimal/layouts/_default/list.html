{{ define "main" }}
<div class="list-page">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="list-description">{{ . }}</div>{{ end }}

  <div class="post-list">
    {{ range .Pages }}
    <article class="post-card">
      <div class="post-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
        {{ with .Params.tags }}
          {{ range . }}
            <span class="tag-chip">{{ . }}</span>
          {{ end }}
        {{ end }}
      </div>
      <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
      <p class="post-summary">{{ with .Params.summary }}{{ . }}{{ else }}{{ .Summary }}{{ end }}</p>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
